apiVersion: v1
kind: Service
metadata:
  name: web-deploy-svc
  namespace: dev
  annotations:
    # Creates a modern Network Load Balancer (NLB) instead of Classic LB
    service.beta.kubernetes.io/aws-load-balancer-type: "external"
    # CRITICAL for Fargate: routes traffic directly to Pod IPs (not node IPs)
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
    # Makes the NLB accessible from the internet
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
spec:
  selector:
    app: web-deploy
  ports:
  - port: 80
    targetPort: 80
  type: LoadBalancer
