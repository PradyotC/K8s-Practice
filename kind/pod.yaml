apiVersion: v1
kind: Pod
metadata:
  name: mypod
  namespace: webapp
  labels:
    app: mypod
spec:
  containers:
  - name: myapp
    image: nginx:1.27
    ports:
    - containerPort: 80
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "250m"
        memory: "256Mi"
